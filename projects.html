    <!-- <div id='text1'><strong>wonderlost</strong> = the name of a band in a scrapped novel from my teenage years<br><strong>girl wonderlost</strong> = moniker, title, alias, me in certain lights<br><strong>girl-wonderlost</strong> = place, image, repository. somewhere in between printed on a t-shirt and kept in a shoebox under the bed.<br><br>this is the fourth attempt. the first was too naive, too attached to a formula. the next two required a degree of maintenance incompatible with my true goal, which i've only recently come across. and this one, i think, will feel right soon. i am one of those people that can get used to anything, with a little time.<br><br>girl-wonderlost is an image and a place. a reflection and a catchment. you can see me and you can look through me here, more easily than any other manifestation of myself. there was a time when the ease of that would offend me, because i assumed complexity required mystery. and i think in most endeavors, i still follow that line of thinking.
    </div> -->
