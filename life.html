<style>
@import url('https://fonts.googleapis.com/css2?family=Xanh+Mono:ital@0;1&display=swap');

body {
  margin: 0 auto;
  font-family: 'Xanh Mono', monospace;
  background-image: url(images/bg2.jpg);
  color: #000;
}

/* PAGE CENTER */
.page {
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 60px;
  max-width: 1000px;
  width: 100%;
}

/* BOX = 3x3 CANVAS */
.box {
  position: relative;
  aspect-ratio: 1 / 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);

  box-shadow: 0 0 0 1px #00000024;
  overflow: hidden;
  padding: 15px;
}

/* IMAGES */
.box img {
  width: 90%;
  justify-self: center;
  align-self: center;

  /* dither effect instead of grayscale */
  image-rendering: pixelated;
  cursor: pointer;
  transform: rotate(var(--rot, 0deg));
}

/* TEXT MODE */
.box .text {
  grid-column: 1 / span 3;
  grid-row: 1 / span 3;

  padding: 5px;
  font-size: 0.9rem;
  line-height: 1.4;
}

/* FULL VIEWER OVERLAY */
/* FULL OVERLAY */
.viewer {
  position: fixed;
  inset: -5%;
  background: rgba(255, 255, 255, 0.136);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* IMAGE FRAME (center) */
.viewer-inner {
  width: 60vw;
  height: 60vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(255, 255, 255, 0.552);
  border: 1px solid #000;
  position: relative;
}

/* IMAGE */
.viewer-inner img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* CONTROLS */

/* CLOSE */
.close-btn {
  position: absolute;
  top: 3vh;
  right: 3vw;
}

/* BACK */
.back-btn {
  position: absolute;
  left: 3vw;
  top: 50%;
}

/* NEXT */
.next-btn {
  position: absolute;
  right: 3vw;
  top: 50%;
}

/* MOBILE */
@media (max-width: 700px) {
  .grid {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .box {
    aspect-ratio: auto;
    height: 500px;
  }

  .box img {
    width: 80%;
  }

  .viewer-inner {
    width: 90vw;
    height: 70vh;
  }

  /* keep close in top-right */
  .close-btn {
    top: 3vh;
    right: 4vw;
  }

  .back-btn,
  .next-btn {
    top: auto;
    transform: none;
  }

  .back-btn {
    position: absolute;
    bottom: 3.5vh;
    left: 10vw;
  }

  .next-btn {
    position: absolute;
    bottom: 3.5vh;
    right: 10vw;
  }
}

</style>
</head>

<body>

<script>
function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

document.querySelectorAll(".box").forEach((box, boxIndex) => {

  const count = box.dataset.count;
  const imgs = Array.from(box.querySelectorAll("img"));

  // TEXT BOX → skip image logic
  if (count === "text") return;

  // 3x3 slots
  let slots = Array.from({ length: 9 }, (_, i) => i);

  // deterministic shuffle
  for (let i = slots.length - 1; i > 0; i--) {
    const r = seededRandom(i + boxIndex + box.dataset.seed.length) * (i + 1);
    const j = Math.floor(r);
    [slots[i], slots[j]] = [slots[j], slots[i]];
  }

  const maxImgs = Math.min(parseInt(count), 9);

  imgs.slice(0, maxImgs).forEach((img, i) => {
    const slot = slots[i];

    const row = Math.floor(slot / 3);
    const col = slot % 3;

    img.style.gridRow = row + 1;
    img.style.gridColumn = col + 1;

  });

  // hide extra images
  imgs.slice(maxImgs).forEach(img => {
    img.style.display = "none";
  });
  
  /* store images per box */
const boxData = [];

/* collect + prepare images */
document.querySelectorAll(".box").forEach((box, boxIndex) => {

  const imgs = Array.from(box.querySelectorAll("img"));
  const maxImgs = parseInt(box.dataset.count);

  const slots = Array.from({ length: 9 }, (_, i) => i);

  for (let i = slots.length - 1; i > 0; i--) {
    const r = Math.sin(i + boxIndex + box.dataset.seed.length) * 10000;
    const j = Math.floor((r - Math.floor(r)) * (i + 1));
    [slots[i], slots[j]] = [slots[j], slots[i]];
  }

  const activeImgs = imgs.slice(0, maxImgs);
  boxData.push(activeImgs);

  activeImgs.forEach((img, i) => {
    const slot = slots[i % 9];

    img.style.gridRow = Math.floor(slot / 3) + 1;
    img.style.gridColumn = (slot % 3) + 1;

    const rot = (Math.sin(slot + boxIndex) * 10) - 5;
    img.style.setProperty("--rot", `${rot}deg`);
  });

});

/* viewer state */
let currentList = [];
let currentIndex = 0;

/* OPEN VIEWER */
function openViewer(list, index) {

  currentList = list;
  currentIndex = index;

  document.querySelector(".viewer")?.remove();

  const viewer = document.createElement("div");
  viewer.className = "viewer";

  const inner = document.createElement("div");
  inner.className = "viewer-inner";

  const img = document.createElement("img");
  img.src = currentList[currentIndex].src;

  const controls = document.createElement("div");
  controls.className = "controls";
  controls.innerHTML = `
    <span id="back">(back)</span>
    <span id="next">(next)</span>
    <span id="close">(close)</span>
  `;

  inner.appendChild(controls);
  inner.appendChild(img);
  viewer.appendChild(inner);
  document.body.appendChild(viewer);

 /* controls */

controls.innerHTML = `
  <a class="link back-btn">[back]</a>
  <a class="link next-btn">[next]</a>
  <a class="link close-btn">[close]</a>
`;

inner.appendChild(controls);
inner.appendChild(img);
viewer.appendChild(inner);
document.body.appendChild(viewer);

/* close */
controls.querySelector(".close-btn").onclick = (e) => {
  e.preventDefault();
  viewer.remove();
};

/* next */
controls.querySelector(".next-btn").onclick = (e) => {
  e.preventDefault();
  currentIndex = (currentIndex + 1) % currentList.length;
  img.src = currentList[currentIndex].src;
};

/* back */
controls.querySelector(".back-btn").onclick = (e) => {
  e.preventDefault();
  currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
  img.src = currentList[currentIndex].src;
};

  /* click outside closes */
  viewer.onclick = (e) => {
    if (e.target === viewer) viewer.remove();
  };

  /* ESC close */
  document.onkeydown = (e) => {
    if (e.key === "Escape") viewer.remove();
  };
}

/* attach click handlers */
document.querySelectorAll(".box").forEach((box, i) => {
  const imgs = box.querySelectorAll("img");
  const list = boxData[i];

  imgs.forEach((img, idx) => {
    img.addEventListener("click", () => {
      openViewer(list, idx);
    });
  });
});
  
});

</script>
